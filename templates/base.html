<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudySphere{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for webkit browsers */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a202c;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #718096;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="flex flex-col h-screen">
        <!-- Navbar -->
        <header class="bg-gray-800 p-4 flex justify-between items-center">
            <div class="flex items-center">
                <a href="{% url 'root' %}" class="text-xl font-bold">StudySphere</a>
            </div>
            <div class="flex items-center">
                {% if user.is_authenticated %}
                <a href="{% url 'user_search' %}" class="text-white mr-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </a>
                <div class="hidden md:flex items-center">
                    <a href="{% url 'groups:group_list' %}" class="text-white mr-4">Groups</a>
                    <a href="{% url 'conversation_list' %}" class="text-white">Messages</a>
                </div>
                <div class="relative ml-4">
                    <button id="user-menu-btn" class="flex items-center">
                        <img src="{% if user.profile.avatar %}{{ user.profile.avatar.url }}{% else %}https://via.placeholder.com/40{% endif %}" alt="Avatar" class="w-8 h-8 rounded-full">
                    </button>
                    <div id="user-menu" class="absolute right-0 mt-2 w-48 bg-gray-700 rounded-md shadow-lg py-1 hidden">
                        <a href="{% url 'profile' %}" class="block px-4 py-2 text-sm text-white hover:bg-gray-600">Your Profile</a>
                        <a href="{% url 'friends_list' %}" class="block px-4 py-2 text-sm text-white hover:bg-gray-600">Friends</a>
                        <a href="{% url 'friend_requests_list' %}" class="block px-4 py-2 text-sm text-white hover:bg-gray-600">Friend Requests</a>
                        <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm text-white hover:bg-gray-600">Sign out</a>
                    </div>
                </div>
                {% endif %}
            </div>
        </header>

        <!-- Main content -->
        <main class="flex-1 p-6 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const userMenuBtn = document.getElementById('user-menu-btn');
        const userMenu = document.getElementById('user-menu');

        if (userMenuBtn) {
            userMenuBtn.addEventListener('click', () => {
                userMenu.classList.toggle('hidden');
            });
        }
    </script>
</body>
</html>
