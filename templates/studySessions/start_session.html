{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto">
    <h1 class="text-2xl font-bold mb-4">Start a new Study Session for {{ group.name }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Start Session</button>
    </form>
</div>
{% endblock %}
