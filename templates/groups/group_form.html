{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>{% if object %}Edit Group{% else %}Create Group{% endif %}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">{% if object %}Save Changes{% else %}Create Group{% endif %}</button>
    </form>
</div>
{% endblock %}
