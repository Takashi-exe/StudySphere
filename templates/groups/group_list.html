{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>My Groups</h2>
    <div class="row">
        {% for group in groups %}
        <div class="col-md-4">
            <div class="card mb-4">
                <img src="{{ group.cover_image.url }}" class="card-img-top" alt="{{ group.name }}">
                <div class="card-body">
                    <h5 class="card-title">{{ group.name }}</h5>
                    <p class="card-text">{{ group.members.count }} members</p>
                    <a href="{% url 'groups:group_detail' group.pk %}" class="btn btn-primary">View Group</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    <a href="{% url 'groups:group_create' %}" class="btn btn-primary">Create New Group</a>
</div>
{% endblock %}
