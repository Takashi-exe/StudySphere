<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#060E20] text-white flex flex-col h-full">
    <header class="p-4">
        <a href="{% url 'root' %}" class="text-2xl font-bold text-[#D0BCFF]">Study Sphere</a>
    </header>
    <main class="flex-grow flex items-center justify-center text-center relative">
        <div class="absolute inset-0 flex items-center justify-center">
            <span class="text-[30rem] font-extrabold text-white/5 opacity-50">403</span>
        </div>
        <div class="relative z-10">
            <div class="inline-block p-5 bg-[#222A3D] rounded-full">
                <i data-lucide="lock" class="w-16 h-16 text-[#D0BCFF]"></i>
            </div>
            <h1 class="mt-8 text-4xl font-bold">Access Denied</h1>
            <p class="mt-2 text-lg text-[#958EA0]">You do not have permission to access this page.</p>
            <div class="mt-8 flex justify-center gap-4">
                <a href="{% url 'accounts:login' %}" class="px-6 py-3 rounded-lg font-semibold bg-[#D0BCFF] text-[#0B1326] hover:bg-opacity-90">Log In</a>
                <a href="{% url 'root' %}" class="px-6 py-3 rounded-lg font-semibold border border-[#2D3449]/50 text-[#958EA0] hover:bg-[#2D3449]">Go to Dashboard</a>
            </div>
            <p class="mt-12 text-sm text-[#958EA0]">Contact the developer at <a href="mailto:support@studysphere.dev" class="underline hover:text-white">support@studysphere.dev</a></p>
        </div>
    </main>
    <footer class="p-4 text-center text-sm text-[#958EA0]">
        <p>© 2024 Study Sphere. Focus & Flourish.</p>
        <div class="mt-2 space-x-4">
            <a href="#" class="hover:underline">Privacy Policy</a>
            <a href="#" class="hover:underline">Terms of Service</a>
            <a href="#" class="hover:underline">Support</a>
        </div>
    </footer>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
