{% extends 'base.html' %}
{% block title %}Your Friends{% endblock %}
{% block content %}
    <h1 class="text-2xl font-bold mb-4">Your Friends</h1>
    {% if friends %}
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {% for friend in friends %}
                <div class="bg-gray-800 rounded-lg p-4 flex items-center justify-between">
                    <a href="{% url 'view_profile' username=friend.username %}" class="flex items-center">
                        <img src="{% if friend.profile.avatar %}{{ friend.profile.avatar.url }}{% else %}/static/default_avatar.png{% endif %}" alt="Avatar" class="w-12 h-12 rounded-full mr-4">
                        <span>{{ friend.username }}</span>
                    </a>
                    <a href="{% url 'start_conversation' username=friend.username %}" class="bg-green-500 text-white px-3 py-1 rounded">Message</a>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>You don't have any friends yet.</p>
    {% endif %}
{% endblock %}
