{% extends 'base.html' %}
{% block title %}User Search{% endblock %}
{% block content %}
    <h1 class="text-2xl font-bold mb-4">Search for Users</h1>
    <input type="text" id="search-input" placeholder="Start typing to search..." class="w-full bg-gray-700 text-white rounded-md px-3 py-2">
    <div id="search-results" class="mt-4"></div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('keyup', () => {
            const query = searchInput.value;
            if (query.length > 0) {
                fetch(`/api/user_search/?q=${query}`)
                    .then(response => response.json())
                    .then(data => {
                        let resultsHtml = '';
                        if (data.users.length > 0) {
                            data.users.forEach(user => {
                                resultsHtml += `<div class="p-2 hover:bg-gray-700"><a href="/profile/${user.username}/">${user.username}</a></div>`;
                            });
                        } else {
                            resultsHtml = '<p>No users found.</p>';
                        }
                        searchResults.innerHTML = resultsHtml;
                    });
            } else {
                searchResults.innerHTML = '';
            }
        });
    </script>
{% endblock %}
