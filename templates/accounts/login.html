{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-white text-center mb-8">Login to StudySphere</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_username" class="block text-gray-400 mb-2">Username</label>
                <input type="text" name="username" id="id_username" class="w-full bg-gray-700 rounded-md p-2 text-white" required>
            </div>
            <div class="mb-6">
                <label for="id_password" class="block text-gray-400 mb-2">Password</label>
                <input type="password" name="password" id="id_password" class="w-full bg-gray-700 rounded-md p-2 text-white" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md">Login</button>
        </form>
        <p class="text-center text-gray-400 mt-4">
            Don't have an account? <a href="{% url 'register' %}" class="text-blue-400 hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
