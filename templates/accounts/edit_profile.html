{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h2 class="text-2xl font-bold text-white text-center mb-8">Edit Your Profile</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="id_first_name" class="block text-gray-400 mb-2">First Name</label>
                    <input type="text" name="first_name" id="id_first_name" value="{{ user_form.first_name.value|default:'' }}" class="w-full bg-gray-700 rounded-md p-2 text-white">
                </div>
                <div>
                    <label for="id_last_name" class="block text-gray-400 mb-2">Last Name</label>
                    <input type="text" name="last_name" id="id_last_name" value="{{ user_form.last_name.value|default:'' }}" class="w-full bg-gray-700 rounded-md p-2 text-white">
                </div>
            </div>
            <div class="mt-6">
                <label for="id_email" class="block text-gray-400 mb-2">Email</label>
                <input type="email" name="email" id="id_email" value="{{ user_form.email.value|default:'' }}" class="w-full bg-gray-700 rounded-md p-2 text-white">
            </div>
            <div class="mt-6">
                <label for="id_bio" class="block text-gray-400 mb-2">Bio</label>
                <textarea name="bio" id="id_bio" class="w-full bg-gray-700 rounded-md p-2 text-white">{{ profile_form.bio.value|default:'' }}</textarea>
            </div>
            <div class="mt-6">
                <label for="id_location" class="block text-gray-400 mb-2">Location</label>
                <input type="text" name="location" id="id_location" value="{{ profile_form.location.value|default:'' }}" class="w-full bg-gray-700 rounded-md p-2 text-white">
            </div>
            <div class="mt-6">
                <label for="id_github_url" class="block text-gray-400 mb-2">GitHub URL</label>
                <input type="url" name="github_url" id="id_github_url" value="{{ profile_form.github_url.value|default:'' }}" class="w-full bg-gray-700 rounded-md p-2 text-white">
            </div>
            <div class="mt-6">
                <label for="id_avatar" class="block text-gray-400 mb-2">Avatar</label>
                <input type="file" name="avatar" id="id_avatar" class="w-full bg-gray-700 rounded-md p-2 text-white">
            </div>
            <div class="mt-8">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
