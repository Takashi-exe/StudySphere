services:
  - type: web
    name: studysphere
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn studysphere.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: studysphere-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: connectionString

databases:
  - name: studysphere-db
    databaseName: studysphere
    plan: free
    user: studysphere

services:
  - type: redis
    name: redis
    plan: free
    ipAllowList: []
